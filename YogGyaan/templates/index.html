<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YogGyaan - Login</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2" />
  <style>
    .auth-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      margin: 1rem 0
    }

    .auth-tab {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .04);
      color: var(--text);
      border-radius: 12px;
      padding: .65rem;
      font-weight: 800;
      cursor: pointer
    }

    .auth-tab.active {
      background: linear-gradient(135deg, var(--green), #60a5fa);
      color: #04130b
    }

    .auth-line {
      margin: 1rem 0;
      color: #cbd5e1;
      font-size: .98rem;
      line-height: 1.55
    }

    .landing-card {
      padding: 1.6rem !important
    }

    .form-group {
      margin-bottom: .75rem
    }

    .auth-note {
      font-size: .72rem;
      color: var(--text-muted);
      margin-top: .6rem
    }

    .pose-preview-grid {
      display: none !important
    }
  </style>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#1a473f">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <script src="/static/js/pwa.js" defer></script>
</head>

<body>
  <div class="landing-page">
    <div class="landing-bg"></div>
    <div id="particles" aria-hidden="true"></div>
    <div class="landing-card card">
      <div class="landing-logo">
        <h1 class="landing-title shimmer-text">YogGyaan</h1>
        <p class="landing-subtitle">Breathe. Balance. Become legendary.</p>
      </div>
      
      <div class="auth-switch">
        <button type="button" class="auth-tab active" data-mode="login">Login</button>
        <button type="button" class="auth-tab" data-mode="register">Create Account</button>
      </div>
      <form action="/login" method="POST" autocomplete="off">
        <input type="hidden" id="mode" name="mode" value="login" />
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="input" type="text" id="username" name="username" placeholder="Enter username" minlength="3"
            maxlength="30" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="input" type="password" id="password" name="password" placeholder="Enter password" minlength="6"
            maxlength="80" required />
        </div>
        <div class="form-group" id="phoneGroup" style="display:none">
          <label class="form-label" for="phone">Phone Number <span
              style="color:var(--text-muted);font-weight:600">(optional)</span></label>
          <input class="input" type="tel" id="phone" name="phone" placeholder="Enter phone number"
            pattern="[0-9+\- ]{7,15}" maxlength="15" />
        </div>
        {% if error %}<span class="form-error">{{ error }}</span>{% endif %}
        <button id="authSubmit" type="submit" class="btn btn-primary btn-full btn-lg">Login to YogGyaan</button>
        <p class="auth-note">Passwords are stored securely as hashes. Usernames must be unique.</p>
      </form>
    </div>
  </div>
  <script>
    document.querySelectorAll('.auth-tab').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const m = btn.dataset.mode;
      document.getElementById('mode').value = m;
      document.getElementById('authSubmit').textContent = m === 'register' ? 'Create Account' : 'Login to YogGyaan';
      const pg = document.getElementById('phoneGroup'), phone = document.getElementById('phone');
      if (pg) { 
        pg.style.display = m === 'register' ? 'block' : 'none'; 
      }
      if (phone) { 
        phone.required = false; 
      }
    }));
    const container = document.getElementById('particles'); for (let i = 0; i < 22; i++) { const p = document.createElement('div'); p.className = 'particle'; p.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;animation-delay:${Math.random() * 3}s;animation-duration:${3 + Math.random() * 2}s;opacity:${0.1 + Math.random() * 0.3};background:${Math.random() > 0.6 ? '#a78bfa' : '#4ade80'};`; container.appendChild(p); }
  </script>
</body>

</html>
